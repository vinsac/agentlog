name: agentlog-incident-replay-gate

on:
  workflow_dispatch:

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Replay incident from JSONL
        env:
          AGENTLOG_FILE: ./.agentlog/sessions.jsonl
        run: |
          python3 examples/incident_replay_workflow.py \
            --input "${AGENTLOG_FILE}" \
            --output ./artifacts/incident_replay.json

      - name: Generate regression test scaffold
        run: |
          python3 examples/trace_to_regression_test.py \
            --incident-report ./artifacts/incident_replay.json \
            --output ./artifacts/test_trace_regression.py

      - name: Upload replay artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentlog-replay-artifacts
          path: artifacts/
