name: agentlog-benchmark-gate

on:
  workflow_dispatch:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run AgentLog benchmark
        run: |
          python3 examples/benchmark_fix_iterations.py --repeat 3 --output ./artifacts/benchmark.json

      - name: Aggregate beta metrics and enforce thresholds
        run: |
          python3 examples/beta_metrics_collector.py \
            --input ./artifacts/benchmark.json \
            --output-json ./artifacts/beta_metrics.json \
            --output-md ./artifacts/beta_metrics.md \
            --one-shot-threshold 0.80 \
            --max-avg-iterations 2.0 \
            --max-avg-time-ms 500 \
            --fail-on-threshold

      - name: Upload AgentLog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentlog-benchmark-artifacts
          path: artifacts/
